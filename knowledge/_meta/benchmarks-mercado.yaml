# ---------------------------------------------------------------------------
# benchmarks-mercado.yaml
# ---------------------------------------------------------------------------
# Snapshot SEMIVOLATIL del mercado AR para que el chat tenga base mínima.
# REGLA OPERATIVA del chat:
#   - Si el dato consultado tiene last_verified < 90 días: úsalo + cita fecha.
#   - Si tiene >= 90 días: úsalo SOLO como referencia + redirige a fuente.
#   - Si no está acá: NO inventes, redirige a fuente.
# Fuentes de re-validación: ZonaProp Indice, Reporte Inmobiliario, Mercado Libre Inmuebles,
# Properati, Indec, AEV CABA, CEDU, Toribio Achaval, Tizado, LJ Ramos.
# ---------------------------------------------------------------------------

schema_version: "1.0"
last_verified: "2026-05-11"
moneda: "USD"
metodologia: "valores promedio publicados de usado y pozo, ponderados por mix típico de unidades. Banda 25-75 percentil. Rango aproximado, no auditoría."

