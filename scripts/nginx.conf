# nginx config — sirve el frontend estático y proxie /api/* al backend.
# Con esto la app entera vive bajo una sola URL: locamente
# http://localhost:5173, y públicamente sea cual sea el tunnel/dominio.
#
# El frontend (config.js) detecta same-origin y manda los fetch a
# /api/... cuando el hostname no es localhost — eso evita CORS y cache
# del navegador sobre dos orígenes distintos.

# Backend upstream: containers en la misma docker network.
# Si necesitás changear el host (por ej. dev fuera de compose), cambiar
# acá y reiniciar el container del frontend.
upstream re_backend {
  server re-backend:8000;
  keepalive 16;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache off en dev para que F5 traiga cambios al instante.
  add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  add_header Pragma "no-cache" always;
  expires 0;

  # Body grande para upload de planos (imágenes hasta ~6 MB c/u, max 4).
  client_max_body_size 12m;

  # ── API → backend ──────────────────────────────────────────────
  # Reverse proxy con streaming friendly (SSE / chat).
  # Mantiene la Authorization header y pasa el host original.
  location /api/ {
    proxy_pass http://re_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;             # SSE necesita streaming sin buffer
    proxy_cache off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # ── Reportes generados (PDFs/DOCXs del agente SOL) ────────────
  location /static/ {
    proxy_pass http://re_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── /health proxiado para uptime checks externos (UptimeRobot) ─
  location = /health {
    proxy_pass http://re_backend/health;
    access_log off;
  }

  # ── Frontend (SPA-ish: archivos estáticos con fallback) ───────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
