# Netlify config para el frontend de RE Expert.
#
# Arquitectura:
#   - Netlify sirve los archivos estáticos de frontend/ (HTML/JS/CSS).
#   - Backend FastAPI corre en Render (re-expert-api.onrender.com).
#   - Para evitar CORS y que toda la app viva bajo el mismo dominio
#     (re-expert.netlify.app o el dominio custom), Netlify hace
#     reverse-proxy de /api/* y /static/* al backend de Render.
#   - Esto significa que `frontend/config.js` puede usar API_BASE=''
#     (same-origin) en producción y todo "just works".
#
# Si cambiás la URL del backend (ej. Render le asigna otro hostname
# como re-expert-api-XXXX.onrender.com), actualizá las dos líneas
# `to = "..."` de abajo y commit. Netlify rebuildea solo.

[build]
  base = "frontend"
  publish = "."
  command = ""

# ── Reverse proxy: /api/* → backend en Render ────────────────────────
# El status=200 fuerza el rewrite (no es un redirect 301/302 — el
# browser no se entera, queda como same-origin).
# El force=true se aplica antes de las reglas de SPA fallback.
[[redirects]]
  from = "/api/*"
  to = "https://re-expert-api.onrender.com/api/:splat"
  status = 200
  force = true

# /static/* (PDFs/DOCXs generados por SOL) → backend
[[redirects]]
  from = "/static/*"
  to = "https://re-expert-api.onrender.com/static/:splat"
  status = 200
  force = true

# /health → backend (útil para UptimeRobot/monitoring desde el front-end)
[[redirects]]
  from = "/health"
  to = "https://re-expert-api.onrender.com/health"
  status = 200
  force = true

# ── Pretty URLs ──────────────────────────────────────────────────────
# Netlify por default ya hace pretty URLs (login → login.html), pero
# para que /forgot-password y /reset-password no caigan en 404 antes
# de que se aplique pretty URL, los listamos explícitos.
[[redirects]]
  from = "/forgot-password"
  to = "/forgot-password.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/reset-password.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/account"
  to = "/account.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

# ── Headers de seguridad ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # HSTS: 6 meses, incluye subdomains. Cuando estés 100% seguro
    # de que TODO el tráfico de re-expert.app va por HTTPS, sumá `preload`.
    Strict-Transport-Security = "max-age=15552000; includeSubDomains"
