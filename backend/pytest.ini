[pytest]
testpaths = tests
asyncio_mode = auto
pythonpath = .
# test_all.py and test_project_full.py are standalone pre-deploy verification
# scripts (all logic at module scope, call sys.exit(1) on failure). They are
# meant to be invoked directly via `python tests/test_all.py`, not collected
# by pytest — their import alone aborts the whole pytest run.
addopts = --ignore=tests/test_all.py --ignore=tests/test_project_full.py
