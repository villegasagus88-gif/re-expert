<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <!-- Previene que el token del query string viaje en el header Referer
       cuando la página carga recursos externos (fuentes, sentry, etc). -->
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña · RE Expert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-weight='700' font-size='14' fill='white'>RE</text></svg>">
  <link rel="stylesheet" href="auth.css">
  <script src="config.js"></script>
  <script src="sentry.js"></script>
</head>
<body>
  <div class="auth-shell">
    <a href="index.html" class="auth-brand" aria-label="RE Expert">
      <div class="auth-brand-logo">RE</div>
      <div>
        <div class="auth-brand-text">RE Expert</div>
        <div class="auth-brand-subtitle">Real Estate AI</div>
      </div>
    </a>

    <div class="auth-card">
      <h1 class="auth-title">Nueva contraseña</h1>
      <p class="auth-subtitle">Elegí una contraseña nueva para tu cuenta. Mínimo 8 caracteres, una mayúscula y un número.</p>

      <div id="auth-alert" class="alert" role="alert"></div>
      <div id="missing-token-alert" class="alert alert-error" style="display:none">
        El link no es válido. Pedí uno nuevo desde <a href="forgot-password.html">"Olvidé mi contraseña"</a>.
      </div>

      <form id="reset-form" novalidate autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="password">Contraseña nueva</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="new-password"
            minlength="8"
            required
          >
          <div id="password-error" class="form-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password-confirm">Repetí la contraseña</label>
          <input
            id="password-confirm"
            name="password-confirm"
            type="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="new-password"
            minlength="8"
            required
          >
          <div id="password-confirm-error" class="form-error"></div>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary">
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-label">Actualizar contraseña</span>
        </button>
      </form>

      <div class="auth-toggle">
        <a href="login.html">← Volver al inicio de sesión</a>
      </div>
    </div>

    <div class="auth-footer">© 2026 RE Expert · Real Estate AI para Argentina</div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Si no hay token en la URL, mostramos el aviso y deshabilitamos el form.
    (function () {
      const params = new URLSearchParams(window.location.search);
      if (!params.get('token')) {
        document.getElementById('missing-token-alert').style.display = '';
        document.getElementById('reset-form').style.display = 'none';
        return;
      }
      document.getElementById('reset-form').addEventListener('submit', window.REAuth.handleResetSubmit);
    })();
  </script>
</body>
</html>
