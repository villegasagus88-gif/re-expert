<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña · RE Expert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-weight='700' font-size='14' fill='white'>RE</text></svg>">
  <link rel="stylesheet" href="auth.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="auth-shell">
    <a href="index.html" class="auth-brand" aria-label="RE Expert">
      <div class="auth-brand-logo">RE</div>
      <div>
        <div class="auth-brand-text">RE Expert</div>
        <div class="auth-brand-subtitle">Real Estate AI</div>
      </div>
    </a>

    <div class="auth-card">
      <h1 class="auth-title">Nueva contraseña</h1>
      <p class="auth-subtitle">Elegí una contraseña nueva para tu cuenta. Mínimo 8 caracteres, con una mayúscula y un número.</p>

      <div id="auth-alert" class="alert" role="alert"></div>

      <form id="reset-form" novalidate autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="password">Nueva contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          >
          <div id="password-error" class="form-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password2">Repetir contraseña</label>
          <input
            id="password2"
            name="password2"
            type="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          >
          <div id="password2-error" class="form-error"></div>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary">
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-label">Guardar contraseña</span>
        </button>
      </form>

      <div class="auth-toggle">
        <a href="login.html">Volver a iniciar sesión</a>
      </div>
    </div>

    <div class="auth-footer">© 2026 RE Expert · Real Estate AI para Argentina</div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById('reset-form').addEventListener('submit', window.REAuth.handleResetPassword);
  </script>
</body>
</html>
