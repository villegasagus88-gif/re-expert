<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta · RE Expert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui' font-weight='700' font-size='14' fill='white'>RE</text></svg>">
  <link rel="stylesheet" href="auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase-client.js"></script>
</head>
<body>
  <div class="auth-shell">
    <a href="index.html" class="auth-brand" aria-label="RE Expert">
      <div class="auth-brand-logo">RE</div>
      <div>
        <div class="auth-brand-text">RE Expert</div>
        <div class="auth-brand-subtitle">Real Estate AI</div>
      </div>
    </a>

    <div class="auth-card">
      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-subtitle">Registrate gratis y empezá a consultar al experto en Real Estate argentino.</p>

      <div id="auth-alert" class="alert" role="alert"></div>

      <form id="register-form" novalidate autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="fullName">Nombre completo</label>
          <input
            id="fullName"
            name="fullName"
            type="text"
            class="form-input"
            placeholder="María Gómez"
            autocomplete="name"
            required
          >
          <div id="fullName-error" class="form-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            class="form-input"
            placeholder="tunombre@email.com"
            autocomplete="email"
            required
          >
          <div id="email-error" class="form-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-input"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            minlength="8"
            required
          >
          <div id="password-error" class="form-error"></div>
          <span class="form-hint">Al menos 8 caracteres.</span>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary" style="margin-top:18px">
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-label">Crear cuenta</span>
        </button>
      </form>

      <div class="auth-toggle">
        ¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a>
      </div>
    </div>

    <div class="auth-footer">© 2026 RE Expert · Real Estate AI para Argentina</div>
  </div>

  <script src="auth.js"></script>
  <script>
    window.REAuth.redirectIfAuthenticated();
    document.getElementById('register-form').addEventListener('submit', window.REAuth.handleRegister);
  </script>
</body>
</html>
