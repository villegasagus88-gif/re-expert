name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: Run ruff check
        run: ruff check backend/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    # Postgres real para que la suite corra contra el schema verdadero (antes
    # corría sin DB: cualquier test de round-trip era imposible).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      JWT_SECRET: ci-test-secret-not-for-prod
      DEBUG: "true"
      SCHEDULER_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Bootstrap Postgres (extensions + auth stub)
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -f scripts/db-init/01-extensions.sql

      - name: Run migrations (alembic upgrade head)
        working-directory: backend
        run: alembic upgrade head

      - name: Run pytest
        working-directory: backend
        run: pytest -v

  deploy-staging:
    name: Deploy to staging (Railway auto-deploy)
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy
        run: |
          echo "lint + test pasaron en este push a main."
          echo ""
          echo "IMPORTANTE: Railway auto-deploya desde main vía su integración con"
          echo "GitHub, que es INDEPENDIENTE de este workflow. Para que un build rojo"
          echo "NO llegue a producción, configurar en Railway:"
          echo "  Settings > Deploys > 'Wait for CI' (Check Status before deploy)"
          echo "y/o branch protection en main exigiendo los checks 'lint' y 'test'."
